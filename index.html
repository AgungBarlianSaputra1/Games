<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Story Claw Machine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #f1c40f;
        }

        #game-container {
            position: relative;
            background: #34495e;
            border: 10px solid #e74c3c;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            display: block;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #btn-left { background: #3498db; color: white; }
        #btn-right { background: #3498db; color: white; }
        #btn-drop { background: #2ecc71; color: white; }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.95); }

        #score-board {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🚀 Toy Story Claw Machine 🤠</h1>
    <div id="score-board">Boneka Didapat: <span id="score">0</span></div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
    </div>

    <div class="controls">
        <button id="btn-left">◀ Kiri</button>
        <button id="btn-drop">CAPIT!</button>
        <button id="btn-right">Kanan ▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;

        // Struktur Capit (Claw)
        const claw = {
            x: 200,
            y: 50,
            width: 40,
            height: 30,
            ropeLength: 40,
            state: 'idle', // idle, dropping, retrieving, returning
            speed: 4,
            caughtToy: null
        };

        // Data Boneka Toy Story (Menggunakan warna representatif)
        const toyTypes = [
            { name: 'Woody', color: '#f1c40f', textColor: '#000', label: '🤠' },
            { name: 'Buzz', color: '#2ecc71', textColor: '#fff', label: '🚀' },
            { name: 'Alien', color: '#9b59b6', textColor: '#fff', label: '👁️' },
            { name: 'Lotso', color: '#e91e63', textColor: '#fff', label: '🐻' }
        ];

        let toys = [];

        // Spawn Boneka di bagian bawah
        function initToys() {
            toys = [];
            for (let i = 0; i < 6; i++) {
                const type = toyTypes[Math.floor(Math.random() * toyTypes.length)];
                toys.push({
                    id: i,
                    x: 40 + (i * 60),
                    y: 440,
                    radius: 22,
                    ...type
                });
            }
        }

        // Draw Fungsi
        function drawClaw() {
            // Tali Capit
            ctx.beginPath();
            ctx.moveTo(claw.x, 0);
            ctx.lineTo(claw.x, claw.y);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Kepala Capit
            ctx.fillStyle = '#95a5a6';
            ctx.fillRect(claw.x - claw.width/2, claw.y, claw.width, claw.height);

            // Cakar Kiri & Kanan
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 4;
            
            // Cakar Kiri
            ctx.beginPath();
            ctx.moveTo(claw.x - claw.width/2, claw.y + claw.height);
            ctx.lineTo(claw.x - claw.width/2 - 10, claw.y + claw.height + 20);
            ctx.stroke();

            // Cakar Kanan
            ctx.beginPath();
            ctx.moveTo(claw.x + claw.width/2, claw.y + claw.height);
            ctx.lineTo(claw.x + claw.width/2 + 10, claw.y + claw.height + 20);
            ctx.stroke();
        }

        function drawToys() {
            toys.forEach(toy => {
                ctx.beginPath();
                ctx.arc(toy.x, toy.y, toy.radius, 0, Math.PI * 2);
                ctx.fillStyle = toy.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                // Gambar Emoji/Karakter di tengah bola boneka
                ctx.fillStyle = toy.textColor;
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(toy.label, toy.x, toy.y);
            });
        }

        function updateGame() {
            // Logika Gerakan Capit
            if (claw.state === 'dropping') {
                claw.y += claw.speed;
                if (claw.y >= 400) { // Batas maksimal bawah
                    claw.state = 'retrieving';
                }
                
                // Cek tabrakan dengan boneka saat turun
                toys.forEach((toy, index) => {
                    let dist = Math.hypot(claw.x - toy.x, (claw.y + claw.height) - toy.y);
                    if (dist < toy.radius + 15 && !claw.caughtToy) {
                        claw.caughtToy = toy;
                        toys.splice(index, 1); // Ambil dari daftar di bawah
                        claw.state = 'retrieving';
                    }
                });
            } 
            else if (claw.state === 'retrieving') {
                claw.y -= claw.speed;
                if (claw.caughtToy) {
                    claw.caughtToy.x = claw.x;
                    claw.caughtToy.y = claw.y + claw.height + 10;
                }
                if (claw.y <= 50) {
                    claw.state = 'returning';
                }
            } 
            else if (claw.state === 'returning') {
                if (claw.x > 50) {
                    claw.x -= claw.speed;
                    if (claw.caughtToy) {
                        claw.caughtToy.x = claw.x;
                    }
                } else {
                    // Sampai di drop zone (sebelah kiri)
                    if (claw.caughtToy) {
                        score++;
                        scoreElement.innerText = score;
                        claw.caughtToy = null;
                        // Respawn boneka baru agar tidak sepi
                        if(toys.length < 3) initToys();
                    }
                    claw.state = 'idle';
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Tempat Pembuangan Hadiah (Drop Zone) di kiri bawah
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 400, 70, 100);
            ctx.fillStyle = '#fff';
            ctx.font = "12px Arial";
            ctx.fillText("DROP ZONE", 35, 450);

            drawToys();
            drawClaw();
            updateGame();

            requestAnimationFrame(draw);
        }

        // Kontrol Tombol dan Keyboard
        function moveLeft() {
            if (claw.state === 'idle' && claw.x > 70) claw.x -= 15;
        }

        function moveRight() {
            if (claw.state === 'idle' && claw.x < canvas.width - 40) claw.x += 15;
        }

        function dropClaw() {
            if (claw.state === 'idle') claw.state = 'dropping';
        }

        // Event Listener Tombol On-Screen
        document.getElementById('btn-left').addEventListener('click', moveLeft);
        document.getElementById('btn-right').addEventListener('click', moveRight);
        document.getElementById('btn-drop').addEventListener('click', dropClaw);

        // Event Listener Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === ' ') dropClaw(); // Spasi untuk turun
        });

        // Mulai Game
        initToys();
        draw();
    </script>
</body>
</html>
