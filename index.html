<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Verification - Toy Story</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .verification-card {
            background: white;
            width: 380px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eaeaea;
        }

        h2 {
            margin: 0 0 4px 0;
            font-size: 20px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .instruction {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
        }

        .target-highlight {
            font-weight: bold;
            color: #d35400;
            background: #fef5e7;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .step {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            background: #f5f5f5;
            color: #999;
        }
        .step.active {
            background: #111;
            color: white;
            font-weight: bold;
        }

        #machine-display {
            width: 100%;
            height: 280px;
            background: linear-gradient(to bottom, #ffffff, #f7f9fa);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .control-panel {
            margin-top: 16px;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .joystick-wrapper {
            display: flex;
            gap: 4px;
        }
        .joy-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .joy-btn:active { background: #eee; }

        .action-button {
            flex-grow: 1;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: #111;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-button:hover { background: #222; }
        .action-button:disabled { background: #ccc; cursor: not-allowed; }

        .footer-hint {
            margin-top: 12px;
            font-size: 11px;
            color: #aaa;
        }

        #status-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="verification-card">
        <h2>Verify you're human</h2>
        <div class="instruction">Use the claw to pick up the <span class="target-highlight" id="target-name">🤠 Woody</span></div>

        <div class="steps-indicator">
            <div class="step active" id="step1">1 Move</div>
            <div class="step" id="step2">2 Grab</div>
            <div class="step" id="step3">3 Drop</div>
        </div>

        <div id="machine-display">
            <canvas id="clawCanvas" width="330" height="280"></canvas>
            <div id="status-overlay"></div>
        </div>

        <div class="control-panel">
            <div class="joystick-wrapper">
                <button class="joy-btn" id="left-btn">◀</button>
                <button class="joy-btn" id="right-btn">▶</button>
            </div>
            <button class="action-button" id="action-btn">GRAB</button>
        </div>

        <div class="footer-hint">Gunakan tombol atau Keyboard (A/D atau ◀/▶ untuk gerak, Space untuk capit)</div>
    </div>

    <script>
        const canvas = document.getElementById('clawCanvas');
        const ctx = canvas.getContext('2d');

        const targetNameEl = document.getElementById('target-name');
        const actionBtn = document.getElementById('action-btn');
        const overlay = document.getElementById('status-overlay');
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');

        const pool = [
            { name: 'Woody', emoji: '🤠', color: '#f1c40f' },
            { name: 'Buzz', emoji: '🚀', color: '#2ecc71' },
            { name: 'Alien', emoji: '👁️', color: '#9b59b6' },
            { name: 'Lotso', emoji: '🐻', color: '#e91e63' },
            { name: 'Rex', emoji: '🦖', color: '#27ae60' }
        ];

        const targetToy = pool[Math.floor(Math.random() * pool.length)];
        targetNameEl.innerHTML = `${targetToy.emoji} ${targetToy.name}`;

        let gameState = 'move'; 
        let toys = [];
        
        const claw = {
            x: 165,
            y: 50, 
            width: 30,
            height: 20,
            speed: 3,
            caughtToy: null
        };

        function initToys() {
            let targetIdx = Math.floor(Math.random() * 5);
            for(let i=0; i<5; i++) {
                let toyData = (i === targetIdx) ? targetToy : pool.filter(p => p.name !== targetToy.name)[Math.floor(Math.random() * (pool.length-1))];
                toys.push({
                    name: toyData.name,
                    emoji: toyData.emoji,
                    color: toyData.color,
                    x: 45 + (i * 60),
                    y: 250,
                    radius: 20
                });
            }
        }

        // FUNGSI BARU: Menggambar tali zigzag yang aman & anti-eror
        function drawSmoothRope(startX, startY, endY) {
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            let totalLength = endY - startY;
            let totalSegments = 16; // Jumlah tekukan dikunci statis agar mulus
            let segmentHeight = totalLength / totalSegments;
            let amplitude = 5;

            for (let i = 1; i < totalSegments; i++) {
                let nextY = startY + (i * segmentHeight);
                let direction = (i % 2 === 0) ? 1 : -1;
                ctx.lineTo(startX + (amplitude * direction), nextY);
            }

            ctx.lineTo(startX, endY);
            ctx.strokeStyle = '#b2bec3';
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function drawClaw() {
            // Rel Atas
            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(0, 0, canvas.width, 10);
            
            // Troli
            ctx.fillStyle = '#636e72';
            ctx.fillRect(claw.x - 10, 5, 20, 8);

            // Gambar Tali
            drawSmoothRope(claw.x, 12, claw.y);

            // Kepala Capit
            ctx.fillStyle = '#d63031';
            ctx.fillRect(claw.x - 8, claw.y, 16, 12);

            // Cakar kiri & kanan
            ctx.strokeStyle = '#636e72';
            ctx.lineWidth = 3;
            let openSpread = (gameState === 'dropping' || gameState === 'grabbing') ? 14 : 6;

            ctx.beginPath();
            ctx.moveTo(claw.x - 4, claw.y + 12);
            ctx.lineTo(claw.x - openSpread, claw.y + 26);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(claw.x + 4, claw.y + 12);
            ctx.lineTo(claw.x + openSpread, claw.y + 26);
            ctx.stroke();
        }

        function drawToys() {
            toys.forEach(toy => {
                ctx.beginPath();
                ctx.arc(toy.x, toy.y, toy.radius, 0, Math.PI * 2);
                ctx.fillStyle = toy.color + '22'; 
                ctx.fill();
                
                ctx.font = "22px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(toy.emoji, toy.x, toy.y);
            });
        }

        function changeStepUI(activeStep) {
            step1.classList.remove('active');
            step2.classList.remove('active');
            step3.classList.remove('active');
            if(activeStep === 1) step1.classList.add('active');
            if(activeStep === 2) step2.classList.add('active');
            if(activeStep === 3) step3.classList.add('active');
        }

        function updateLogic() {
            if (gameState === 'dropping') {
                claw.y += claw.speed;
                if (claw.y >= 210) { 
                    gameState = 'grabbing';
                    changeStepUI(2);
                    actionBtn.innerText = "GRABBING...";
                    
                    setTimeout(() => {
                        toys.forEach((toy, idx) => {
                            let dist = Math.abs(claw.x - toy.x);
                            if (dist < 22 && !claw.caughtToy) {
                                claw.caughtToy = toy;
                                toys.splice(idx, 1);
                            }
                        });
                        gameState = 'lifting';
                    }, 600);
                }
            }
            else if (gameState === 'lifting') {
                claw.y -= claw.speed;
                if(claw.caughtToy) {
                    claw.caughtToy.x = claw.x;
                    claw.caughtToy.y = claw.y + 26;
                }
                if (claw.y <= 50) {
                    gameState = 'returning';
                    changeStepUI(3);
                    actionBtn.innerText = "DROPPING...";
                }
            }
            else if (gameState === 'returning') {
                if (claw.x > 35) {
                    claw.x -= claw.speed;
                    if(claw.caughtToy) claw.caughtToy.x = claw.x;
                } else {
                    if (claw.caughtToy) {
                        let finalToy = claw.caughtToy;
                        claw.caughtToy = null;
                        gameState = 'done';
                        
                        if (finalToy.name === targetToy.name) {
                            overlay.innerHTML = "<span style='color:#2ecc71'>✅ Verification Success!</span>";
                            overlay.style.display = "flex";
                        } else {
                            overlay.innerHTML = "<span style='color:#e74c3c'>❌ Incorrect Object. Try Again!</span>";
                            overlay.style.display = "flex";
                            setTimeout(() => { location.reload(); }, 2000);
                        }
                    } else {
                        overlay.innerHTML = "<span style='color:#7f8c8d'>💨 Missed! Try Again.</span>";
                        overlay.style.display = "flex";
                        setTimeout(() => { location.reload(); }, 2000);
                    }
                }
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Drop Zone 
            ctx.fillStyle = '#f1f2f6';
            ctx.fillRect(5, 230, 60, 50);
            ctx.strokeStyle = '#ced6e0';
            ctx.strokeRect(5, 230, 60, 50);

            drawToys();
            drawClaw();
            updateLogic();
            requestAnimationFrame(loop);
        }

        function moveLeft() {
            if (gameState === 'move' && claw.x > 80) claw.x -= 12;
        }
        function moveRight() {
            if (gameState === 'move' && claw.x < canvas.width - 30) claw.x += 12;
        }
        function triggerGrab() {
            if (gameState === 'move') {
                gameState = 'dropping';
                actionBtn.disabled = true;
            }
        }

        document.getElementById('left-btn').addEventListener('click', moveLeft);
        document.getElementById('right-btn').addEventListener('click', moveRight);
        actionBtn.addEventListener('click', triggerGrab);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
            if (e.key === ' ') { e.preventDefault(); triggerGrab(); }
        });

        initToys();
        loop();
    </script>
</body>
</html>
